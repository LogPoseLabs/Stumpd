name: Android Release

# Trigger on version tags (v1.0.0, v1.0.1, etc.)
on:
  push:
    tags:
      - 'v*'

# Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (e.g., v1.0.3)'
        required: true
        default: 'v1.0.0'

# Required permissions to create releases
permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json

      # For unsigned debug build (simpler, no signing needed)
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # For signed release build (requires signing setup - see comments below)
      # - name: Decode Keystore
      #   env:
      #     KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      #   run: |
      #     echo "$KEYSTORE_BASE64" | base64 -d > app/release-keystore.jks
      #
      # - name: Build Release APK
      #   env:
      #     KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      #     KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      #     KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      #   run: ./gradlew assembleRelease

      - name: Get version info
        id: version
        run: |
          # Extract versionName - looks for: versionName = "X.X.X" (where value starts with digit)
          VERSION_NAME=$(grep -E 'versionName\s*=\s*"[0-9]' app/build.gradle.kts | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
          
          # Extract versionCode - looks for: versionCode = N
          VERSION_CODE=$(grep -E 'versionCode\s*=\s*[0-9]+' app/build.gradle.kts | head -1 | tr -d ' ' | cut -d'=' -f2)
          
          echo "Extracted: VERSION_NAME=$VERSION_NAME, VERSION_CODE=$VERSION_CODE"
          
          # Validate we got values
          if [ -z "$VERSION_NAME" ]; then
            echo "ERROR: Could not extract versionName"
            exit 1
          fi
          if [ -z "$VERSION_CODE" ]; then
            echo "ERROR: Could not extract versionCode"
            exit 1
          fi
          
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Stumpd-${{ steps.version.outputs.version_name }}.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Stumpd v${{ steps.version.outputs.version_name }}
          body: |
            ## Stumpd v${{ steps.version.outputs.version_name }}
            
            ### What's New
            - See commit history for changes
            
            ### Installation
            1. Download `Stumpd-${{ steps.version.outputs.version_name }}.apk`
            2. Enable "Install from unknown sources" if prompted
            3. Install and enjoy!
            
            ---
            Build: ${{ steps.version.outputs.version_code }}
          files: |
            app/build/outputs/apk/debug/Stumpd-${{ steps.version.outputs.version_name }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output APK URL
        run: |
          echo "APK will be available at:"
          echo "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/Stumpd-${{ steps.version.outputs.version_name }}.apk"
